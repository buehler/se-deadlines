name: Publish feed

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force publish even if the feed hasn't changed"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-feed
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure Pages
        id: config_pages
        uses: actions/configure-pages@v5

      - name: Decide whether deployment is needed
        id: should_publish
        shell: bash
        env:
          DEPLOYED_URI: ${{ steps.config_pages.outputs.base_url }}/confs.rss
        run: |
          should_publish="$(node ./scripts/check-hash.js)"
          echo "value=${should_publish}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        if: steps.should_publish.outputs.value == 'true' || github.event.inputs.force == 'true'
        shell: bash
        run: npm ci

      - name: Build feed
        if: steps.should_publish.outputs.value == 'true' || github.event.inputs.force == 'true'
        shell: bash
        env:
          SITE_URL: ${{ steps.config_pages.outputs.base_url }}
        run: npm run build

      - name: Prepare Pages artifact
        if: steps.should_publish.outputs.value == 'true' || github.event.inputs.force == 'true'
        shell: bash
        run: |
          mkdir -p _site
          cp confs.rss _site/confs.rss
          cp index.html _site/index.html

      - name: Upload Pages artifact
        if: steps.should_publish.outputs.value == 'true' || github.event.inputs.force == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.should_publish.outputs.value == 'true' || github.event.inputs.force == 'true'
        uses: actions/deploy-pages@v4
